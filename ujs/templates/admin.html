{% extends "base.html" %}
{% block title %}Admin — GavelSearch{% endblock %}
{% block head %}<meta name="robots" content="noindex">{% endblock %}

{% block body %}
<div class="min-h-screen bg-navy">
  <!-- Nav -->
  <nav class="bg-navy flex items-center justify-between px-6 md:px-10 h-16 border-b border-navy-border">
    <a href="/" class="flex items-center gap-2.5 no-underline">
      <img src="/static/img/logo-light.svg" class="w-8 h-8 shrink-0" alt="">
      <span class="text-[15px] font-serif font-medium text-court-bright">GavelSearch</span>
      <span class="text-[10px] font-semibold tracking-wider uppercase text-gold ml-2 border border-gold/30 rounded px-1.5 py-0.5">Admin</span>
    </a>
    <a href="/chat" class="text-[12px] text-court-mid hover:text-court-bright no-underline">Back to chat</a>
  </nav>

  <div class="max-w-3xl mx-auto px-5 py-8 space-y-6" id="admin-root">
    <div class="text-court-dim text-sm">Loading...</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadAdmin() {
  const root = document.getElementById('admin-root');
  try {
    const res = await fetch('/admin/api/status');
    const data = await res.json();
    root.innerHTML = renderDashboard(data);
  } catch(e) {
    root.innerHTML = '<div class="text-red-400">Failed to load status</div>';
  }
}

function renderDashboard(data) {
  const s = data.stats;
  return `
    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
      ${statCard('Cases Indexed', s.cases, 'Total court cases in the database')}
      ${statCard('Fully Analyzed', s.total_analyzed, 'Dockets with deep PDF analysis')}
      ${statCard('Analyzed (24h)', s.analyzed_24h, 'Dockets analyzed in last 24 hours')}
      ${statCard('Queue Pending', s.queue_pending, 'Dockets waiting for analysis')}
      ${statCard('Changes', s.changes, 'Real case updates detected')}
    </div>

    <!-- Services -->
    <div>
      <h2 class="text-sm font-medium text-court-bright mb-3">Services</h2>
      <div class="space-y-2">
        ${data.services.map(svc => {
          const isUp = svc.status === 'active' || svc.status === 'activating';
          const statusColor = isUp ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20';
          const statusLabel = svc.status === 'activating' ? 'running' : svc.status;
          const descs = {
            'ujs-api': 'FastAPI backend — serves chat, search, and data endpoints',
            'ujs-web': 'Flask frontend — serves landing, login, settings, admin pages',
            'ujs-worker': 'Background worker — deep-analyzes docket PDFs from the queue',
            'ujs-ingest': 'Hourly scraper — pulls new cases from UJS portal into the database',
          };
          return `
          <div class="flex items-center justify-between bg-navy-light border border-navy-border rounded-lg px-4 py-3">
            <div>
              <div class="flex items-center gap-2">
                <span class="text-[13px] text-court-bright font-medium">${svc.name}</span>
                <span class="text-[11px] font-medium px-2 py-0.5 rounded ${statusColor}">${statusLabel}</span>
              </div>
              <div class="text-[11px] text-court-dim mt-0.5">${descs[svc.name] || ''}</div>
            </div>
            <div class="flex items-center gap-2">
              <button onclick="toggleService('restart', '${svc.name}')"
                class="text-[11px] px-3 py-1 rounded border border-yellow-500/30 text-yellow-400 hover:bg-yellow-500/10 transition">Restart</button>
              <button onclick="toggleService('${isUp ? 'stop' : 'start'}', '${svc.name}')"
                class="text-[11px] px-3 py-1 rounded border ${isUp ? 'border-red-500/30 text-red-400 hover:bg-red-500/10' : 'border-green-500/30 text-green-400 hover:bg-green-500/10'} transition">
                ${isUp ? 'Stop' : 'Start'}
              </button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Cron Jobs -->
    <div>
      <h2 class="text-sm font-medium text-court-bright mb-3">Cron Jobs</h2>
      ${data.crons.length === 0 ? '<div class="text-court-dim text-[12px]">No cron jobs found</div>' : ''}
      <div class="space-y-2">
        ${data.crons.map(c => `
          <div class="flex items-center justify-between bg-navy-light border border-navy-border rounded-lg px-4 py-3">
            <div>
              <div class="text-[13px] text-court-bright font-medium">${c.name}</div>
              <div class="text-[11px] text-court-dim">${c.schedule} — ${c.desc}</div>
            </div>
            <div class="flex items-center gap-3">
              <span class="text-[11px] font-medium px-2 py-0.5 rounded ${c.active ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-yellow-500/10 text-yellow-400 border border-yellow-500/20'}">${c.active ? 'Running' : 'Halted'}</span>
              <button onclick="toggleCron('${c.active ? 'stop' : 'start'}', '${c.name.toLowerCase()}')"
                class="text-[11px] px-3 py-1 rounded border ${c.active ? 'border-red-500/30 text-red-400 hover:bg-red-500/10' : 'border-green-500/30 text-green-400 hover:bg-green-500/10'} transition">
                ${c.active ? 'Stop' : 'Start'}
              </button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function statCard(label, value, desc) {
  return `<div class="bg-navy-light border border-navy-border rounded-lg p-4 text-center">
    <div class="text-lg font-serif font-medium text-court-bright">${(value || 0).toLocaleString()}</div>
    <div class="text-[11px] text-court-mid mt-1">${label}</div>
    <div class="text-[9px] text-court-dim mt-0.5">${desc}</div>
  </div>`;
}

async function toggleService(action, name) {
  try {
    await fetch('/admin/api/service/' + action + '/' + name);
    setTimeout(loadAdmin, 1000);
  } catch(e) {
    alert('Failed: ' + e.message);
  }
}

async function toggleCron(action, name) {
  try {
    await fetch('/admin/api/cron/' + action + '/' + name);
    loadAdmin();
  } catch(e) {
    alert('Failed: ' + e.message);
  }
}

loadAdmin();
</script>
{% endblock %}
