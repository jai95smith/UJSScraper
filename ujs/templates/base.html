<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}GavelSearch{% endblock %}</title>
<link rel="icon" href="/static/img/favicon.ico" sizes="32x32">
<link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32.png">
<link rel="apple-touch-icon" href="/static/img/apple-touch-icon.png">
<link rel="manifest" href="/static/site.webmanifest">
<link rel="stylesheet" href="/static/css/main.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        navy: { DEFAULT: '#0f1e38', light: '#132240', border: '#1e3254', hover: '#192e4f' },
        gold: { DEFAULT: '#c8a03a', dim: '#a07f2a' },
        court: { bright: '#e8edf5', mid: '#8fa8c8', dim: '#5a7aa0', muted: '#4a6a99', faint: '#6b88aa' }
      },
      fontFamily: {
        serif: ['Source Serif', 'Georgia', 'serif'],
        sans: ['Inter', '-apple-system', 'system-ui', 'sans-serif']
      }
    }
  }
}
</script>
<script src="/static/js/toast.js"></script>
{% block head %}{% endblock %}
<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZEL46NFDF0"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-ZEL46NFDF0');
</script>
</head>
<body class="font-sans">
  {% block body %}{% endblock %}
  <script>const API = '{{ api_url }}';</script>
  {% block scripts %}{% endblock %}
</body>
</html>
