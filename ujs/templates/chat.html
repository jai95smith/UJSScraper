{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="/static/css/chat.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
{% endblock %}

{% block body %}
<div class="flex h-[100dvh]">

  <!-- Mobile header -->
  <div class="md:hidden fixed top-0 inset-x-0 z-30 bg-navy border-b border-navy-border px-4 h-12 flex items-center justify-between">
    <button onclick="toggleSidebar()" class="w-8 h-8 rounded border border-navy-border flex items-center justify-center text-court-mid">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="text-sm font-medium text-court-bright">Court AI</span>
    <button onclick="newChat()" class="w-8 h-8 rounded border border-navy-border flex items-center justify-center text-court-mid">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
    </button>
  </div>

  <!-- Overlay -->
  <div id="sidebar-overlay" class="hidden fixed inset-0 z-40 md:hidden">
    <div class="absolute inset-0 bg-black/60" onclick="toggleSidebar()"></div>
  </div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed md:relative z-50 w-60 bg-navy border-r border-navy-border flex flex-col shrink-0 h-full -translate-x-full md:translate-x-0 transition-transform duration-200">
    <div class="p-3.5 border-b border-navy-border flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 no-underline">
        <div class="w-6 h-6 border border-gold rounded-full flex items-center justify-center">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#c8a03a" stroke-width="1.2"/><path d="M8 17l4-10 4 10" stroke="#c8a03a" stroke-width="1.2" stroke-linecap="round"/></svg>
        </div>
        <span class="text-xs font-medium text-court-bright">Court AI</span>
      </a>
      <button onclick="newChat()" class="w-6 h-6 rounded border border-navy-border flex items-center justify-center text-court-dim hover:text-court-bright transition" title="New search">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      </button>
    </div>
    <div id="chat-list" class="flex-1 overflow-y-auto p-2 space-y-0.5"></div>
    <div class="p-3 border-t border-navy-border">
      <div id="stats" class="text-[10px] text-court-muted"></div>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0 pt-12 md:pt-0">
    <!-- Desktop nav -->
    <nav class="hidden md:flex bg-navy items-center justify-between px-6 h-12 border-b border-navy-border shrink-0">
      <a href="/" class="flex items-center gap-2.5 no-underline">
        <div class="w-7 h-7 border-[1.5px] border-gold rounded-full flex items-center justify-center">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#c8a03a" stroke-width="1.2"/><path d="M8 17l4-10 4 10" stroke="#c8a03a" stroke-width="1.2" stroke-linecap="round"/><line x1="9.5" y1="14.5" x2="14.5" y2="14.5" stroke="#c8a03a" stroke-width="1"/></svg>
        </div>
        <span class="text-[13px] font-medium text-court-bright">Lehigh Valley <span class="text-gold">Court AI</span></span>
      </a>
      <div class="flex items-center gap-3">
        <a href="/" class="text-xs text-court-mid hover:text-court-bright">Home</a>
        <button onclick="newChat()" class="text-[11px] font-medium text-navy bg-gold hover:bg-gold-dim rounded px-3.5 py-1.5">+ New search</button>
      </div>
    </nav>

    <!-- Messages -->
    <main id="chat" class="flex-1 overflow-y-auto bg-navy-light" style="overscroll-behavior:contain;-webkit-overflow-scrolling:touch;">
      <div class="max-w-2xl mx-auto px-4 md:px-6 py-6 space-y-4" id="messages"></div>
    </main>

    <!-- Input -->
    <div class="bg-navy border-t border-navy-border px-4 md:px-6 py-3 shrink-0">
      <div class="max-w-2xl mx-auto">
        <div class="flex gap-2 items-center rounded-md px-3.5 py-1.5 bg-white/[0.06] border border-navy-border focus-within:border-court-dim transition">
          <input id="q" type="text" placeholder="Ask a question..." class="flex-1 bg-transparent text-[16px] md:text-sm text-court-bright placeholder:text-court-dim outline-none py-1.5 font-sans" autofocus />
          <button id="btn" onclick="send()" class="text-[13px] font-medium bg-gold hover:bg-gold-dim text-navy rounded px-4 py-1.5 disabled:opacity-40 transition">
            <span id="btn-text">Ask →</span>
            <svg id="btn-spin" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          </button>
        </div>
        <p class="text-[10px] text-court-muted text-center mt-1.5">Lehigh & Northampton Counties · Not legal advice</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const chat = document.getElementById('chat');
const messages = document.getElementById('messages');
const input = document.getElementById('q');
const btn = document.getElementById('btn');

let allChats = [];
let currentChatId = null;
let chartInstances = {};

/* --- Server-side conversations --- */
async function loadConversations() {
  try {
    const res = await fetch(API + '/conversations');
    allChats = await res.json();
  } catch(e) { allChats = []; }
  renderChatList();
}
async function loadConversation(id) {
  try {
    const res = await fetch(API + '/conversations/' + id);
    if (!res.ok) return null;
    return await res.json();
  } catch(e) { return null; }
}

/* --- Sidebar --- */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('-translate-x-full');
  document.getElementById('sidebar-overlay').classList.toggle('hidden');
}
function closeMobileSidebar() {
  if (window.innerWidth < 768) {
    const s = document.getElementById('sidebar');
    if (!s.classList.contains('-translate-x-full')) toggleSidebar();
  }
}
function renderChatList() {
  document.getElementById('chat-list').innerHTML = allChats.map(c => `
    <div class="flex items-center group">
      <button onclick="loadChat('${c.id}')" class="flex-1 text-left px-2.5 py-1.5 rounded text-[11px] truncate transition
        ${c.id === currentChatId ? 'bg-navy-hover text-court-bright border border-navy-border' : 'text-court-dim border border-transparent hover:text-court-mid'}">
        ${esc(c.title || 'New chat')}
      </button>
      <button onclick="event.stopPropagation();deleteChat('${c.id}')" class="hidden group-hover:flex w-5 h-5 items-center justify-center text-court-dim hover:text-red-400 shrink-0">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  `).join('');
}

/* --- Welcome --- */
function showWelcome() {
  messages.innerHTML = `
    <div id="welcome" class="text-center py-20">
      <div class="w-12 h-12 rounded-2xl bg-gold/10 flex items-center justify-center mx-auto mb-4">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#c8a03a" stroke-width="1.2"/><path d="M8 17l4-10 4 10" stroke="#c8a03a" stroke-width="1.2" stroke-linecap="round"/><line x1="9.5" y1="14.5" x2="14.5" y2="14.5" stroke="#c8a03a" stroke-width="1"/></svg>
      </div>
      <h2 class="font-serif text-lg font-medium text-court-bright mb-2">Search Lehigh Valley court records</h2>
      <p class="text-[13px] text-court-mid max-w-sm mx-auto mb-6">Ask in plain English. Get structured results from the PA Unified Judicial System.</p>
      <div class="flex flex-wrap gap-1.5 justify-center max-w-md mx-auto">
        ${['What hearings are in Lehigh tomorrow?','Show me Smith cases in Northampton','What is Kelli Murphy charged with?','Criminal cases filed this week']
          .map(s => `<button onclick="prefill('${s}')" class="text-[11px] text-court-mid border border-navy-border rounded px-2.5 py-1 bg-navy-hover hover:border-gold hover:text-court-bright transition">${s}</button>`).join('')}
      </div>
    </div>`;
}

/* --- Chat management --- */
function newChat() {
  currentChatId = null;
  history.pushState({}, '', '/chat');
  showWelcome(); renderChatList(); input.focus(); closeMobileSidebar();
}
async function loadChat(id) {
  const conv = await loadConversation(id);
  if (!conv) return;
  currentChatId = id;
  history.pushState({}, '', '/chat/' + id);
  const w = document.getElementById('welcome'); if (w) w.remove();
  messages.innerHTML = '';
  const msgs = conv.messages || [];
  msgs.forEach((m, i) => {
    if (m.role === 'user') {
      messages.insertAdjacentHTML('beforeend', userBubble(m.content));
    } else if (m.role === 'assistant') {
      const rid = 'restored-' + i;
      messages.insertAdjacentHTML('beforeend', botBubbleStatic(rid));
      setTimeout(() => { const el = document.getElementById(rid); if (el) renderFinalResponse(el, m.content, rid); }, 50);
    }
  });
  // If last message is user with no response, check for running job
  const last = msgs[msgs.length - 1];
  if (last && last.role === 'user') {
    checkRunningJob(id);
  }
  renderChatList(); chat.scrollTop = chat.scrollHeight; input.focus(); closeMobileSidebar();
}
async function deleteChat(id) {
  await fetch(API + '/conversations/' + id, {method: 'DELETE'});
  allChats = allChats.filter(c => c.id !== id);
  if (currentChatId === id) newChat(); else renderChatList();
}

/* --- Bubbles --- */
function userBubble(text) {
  return `<div class="flex justify-end">
    <div class="bg-gold/[0.12] border border-gold/25 rounded-xl px-4 py-2.5 max-w-[85%] md:max-w-lg break-words">
      <p class="text-sm text-court-bright leading-relaxed">${esc(text)}</p>
    </div>
  </div>`;
}
function botBubbleStart(statusId, contentId) {
  return `<div class="max-w-2xl py-1">
    <div id="${statusId}" class="text-[11px] text-court-dim mb-1.5 font-mono truncate flex items-center">
      <span id="${statusId}-text"></span>
      <span id="${statusId}-dots" class="thinking-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
    </div>
    <div id="${contentId}" class="prose text-[15px] text-court-bright break-words"></div>
  </div>`;
}

function startThinking(statusId) { /* CSS animation handles it automatically */ }
function stopThinking(statusId) {
  const dotsEl = document.getElementById(statusId + '-dots');
  if (dotsEl) { dotsEl.classList.add('fade-out'); setTimeout(() => dotsEl.remove(), 300); }
}
function retryBubble(question) {
  return `<div class="max-w-2xl py-1">
      <p class="text-sm text-court-dim mb-2">Response was interrupted.</p>
      <button onclick="retryQuestion('${esc(question).replace(/'/g, "\\'")}')" class="text-[12px] font-medium text-navy bg-gold hover:bg-gold-dim rounded px-3 py-1.5 transition">
        Retry →
      </button>
  </div>`;
}
function botBubbleStatic(contentId) {
  return `<div class="max-w-2xl py-1">
    <div id="${contentId}" class="prose text-[15px] text-court-bright break-words"></div>
  </div>`;
}

/* --- Init --- */
loadConversations();
fetch(API + '/stats').then(r => r.json()).then(d => {
  document.getElementById('stats').textContent = d.cases.toLocaleString() + ' cases indexed';
}).catch(() => {});

// Route: /chat/{id} → load conversation, /chat?q= → new with query, /chat → welcome
const CONV_ID = '{{ conversation_id }}';
const initialQuery = new URLSearchParams(window.location.search).get('q');
if (CONV_ID) {
  loadChat(CONV_ID);
} else if (initialQuery) {
  history.replaceState({}, '', '/chat');
  showWelcome();
  input.value = initialQuery;
  setTimeout(() => send(), 300);
} else {
  showWelcome();
}

// Handle browser back/forward
window.addEventListener('popstate', () => {
  const m = window.location.pathname.match(/^\/chat\/(.+)$/);
  if (m) loadChat(m[1]); else newChat();
});

input.addEventListener('keydown', e => { if (e.key === 'Enter' && !btn.disabled) send(); });
function prefill(q) { input.value = q; input.focus(); }
function retryQuestion(q) { input.value = q; send(); }

/* --- Send (server-side job) --- */
async function send() {
  const q = input.value.trim(); if (!q) return;
  input.value = ''; btn.disabled = true;
  document.getElementById('btn-text').classList.add('hidden');
  document.getElementById('btn-spin').classList.remove('hidden');

  const w = document.getElementById('welcome'); if (w) w.remove();

  const id = 'r' + Date.now();
  messages.insertAdjacentHTML('beforeend', userBubble(q) + botBubbleStart(id + '-status', id));
  chat.scrollTop = chat.scrollHeight;

  const statusEl = document.getElementById(id + '-status');
  const statusTextEl = document.getElementById(id + '-status-text');
  const contentEl = document.getElementById(id);
  startThinking(id + '-status');

  try {
    // Submit question — server creates/updates conversation
    const res = await fetch(API + '/ask', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ question: q, conversation_id: currentChatId })
    });
    const { job_id, conversation_id } = await res.json();

    // Update URL and state
    if (!currentChatId) {
      currentChatId = conversation_id;
      history.pushState({}, '', '/chat/' + conversation_id);
      loadConversations();
    }

    // Poll for response
    await pollJob(job_id, statusEl, contentEl, id);
    loadConversations(); // Refresh sidebar

  } catch (e) { stopThinking(id + '-status'); contentEl.textContent = 'Error: ' + e.message; }

  btn.disabled = false;
  document.getElementById('btn-text').classList.remove('hidden');
  document.getElementById('btn-spin').classList.add('hidden');
  statusEl.style.transition = 'opacity 0.4s'; statusEl.style.opacity = '0.5';
  input.focus();
}

/* --- Check for running job on page load --- */
async function checkRunningJob(convId) {
  try {
    const res = await fetch(API + '/conversations/' + convId + '/job');
    const data = await res.json();
    if (data.job_id && (data.status === 'running')) {
      // Resume polling
      const id = 'resume-' + Date.now();
      messages.insertAdjacentHTML('beforeend', botBubbleStart(id + '-status', id));
      const statusEl = document.getElementById(id + '-status');
      const contentEl = document.getElementById(id);
      const resumeTextEl = document.getElementById(id + '-status-text');
      if (resumeTextEl) resumeTextEl.textContent = 'Resuming...';
      else statusEl.textContent = 'Resuming...';
      startThinking(id + '-status');
      btn.disabled = true;
      document.getElementById('btn-text').classList.add('hidden');
      document.getElementById('btn-spin').classList.remove('hidden');
      await pollJob(data.job_id, statusEl, contentEl, id);
      loadConversations();
      btn.disabled = false;
      document.getElementById('btn-text').classList.remove('hidden');
      document.getElementById('btn-spin').classList.add('hidden');
      statusEl.classList.add('opacity-50');
    } else if (data.status === 'completed' && data.job_id) {
      // Job finished while we were away — reload conversation to show response
      await loadChat(convId);
    } else {
      // No job found — show retry
      const conv = await loadConversation(convId);
      const lastMsg = (conv.messages || []).slice(-1)[0];
      if (lastMsg && lastMsg.role === 'user') {
        messages.insertAdjacentHTML('beforeend', retryBubble(lastMsg.content));
      }
    }
  } catch(e) {
    // No job endpoint or error — show retry
    messages.insertAdjacentHTML('beforeend', retryBubble(''));
  }
}

/* --- Poll job --- */
async function pollJob(jobId, statusEl, contentEl, msgId) {
  let seen = 0;
  const statusTextEl = document.getElementById(statusEl.id + '-text');
  let contentStarted = false;
  let lastContent = '';
  let typewriterActive = false;

  // Typewriter: reveals rendered HTML progressively
  function typewrite(el, html, done) {
    if (typewriterActive) return;
    typewriterActive = true;
    // Create hidden container, measure total text length
    const temp = document.createElement('div');
    temp.innerHTML = html;
    const fullText = temp.textContent || '';
    const totalChars = fullText.length;
    if (totalChars < 50) { el.innerHTML = html; typewriterActive = false; if (done) done(); return; }
    // Reveal by adding chars worth of content at a time
    let revealed = 0;
    const charsPerTick = Math.max(3, Math.ceil(totalChars / 60)); // ~60 ticks = ~1.5s
    el.innerHTML = '';
    el.style.visibility = 'visible';
    const iv = setInterval(() => {
      revealed += charsPerTick;
      if (revealed >= totalChars) {
        el.innerHTML = html;
        clearInterval(iv);
        typewriterActive = false;
        if (done) done();
      } else {
        // Reveal proportional slice of the HTML
        const ratio = revealed / totalChars;
        const cutoff = Math.floor(html.length * ratio);
        // Find safe cut point (don't break tags)
        let safe = cutoff;
        const openTag = html.lastIndexOf('<', safe);
        const closeTag = html.lastIndexOf('>', safe);
        if (openTag > closeTag) safe = openTag; // inside a tag, back up
        el.innerHTML = html.slice(0, safe);
      }
      chat.scrollTop = chat.scrollHeight;
    }, 25);
  }

  while (true) {
    try {
      const res = await fetch(API + '/ask/job/' + jobId + '?after=' + seen);
      const data = await res.json();
      if (data.total_length > seen) {
        seen = data.total_length;
        const full = data.response;
        const parts = full.split('\n\n');
        if (parts.length > 1) {
          if (statusTextEl) statusTextEl.textContent = parts[0];
          else statusEl.textContent = parts[0];
          const newContent = parts.slice(1).join('\n\n');
          if (newContent !== lastContent) {
            const rendered = renderMd(newContent);
            const isFirstContent = !contentStarted;
            const isBigUpdate = newContent.length - lastContent.length > 100;
            if (!contentStarted) { stopThinking(statusEl.id); contentStarted = true; }
            if (isBigUpdate && !typewriterActive) {
              typewrite(contentEl, rendered);
            } else if (!typewriterActive) {
              contentEl.innerHTML = rendered;
              chat.scrollTop = chat.scrollHeight;
            }
            lastContent = newContent;
          }
        } else {
          if (statusTextEl) statusTextEl.textContent = full;
          else statusEl.textContent = full;
        }
      }
      if (data.status === 'completed' || data.status === 'error') {
        stopThinking(statusEl.id);
        if (data.error) contentEl.textContent = 'Error: ' + data.error;
        const fullJob = await fetch(API + '/ask/job/' + jobId).then(r => r.json());
        const idx = fullJob.response.indexOf('\n\n');
        const text = idx >= 0 ? fullJob.response.slice(idx + 2) : fullJob.response;
        if (text) {
          // Wait for any active typewriter to finish, then do final render
          const waitForTypewriter = () => new Promise(r => {
            const check = setInterval(() => { if (!typewriterActive) { clearInterval(check); r(); } }, 50);
          });
          await waitForTypewriter();
          renderFinalResponse(contentEl, text, msgId);
        }
        break;
      }
    } catch(e) { stopThinking(statusEl.id); break; }
    await new Promise(r => setTimeout(r, 500));
  }
}

/* --- Rendering --- */
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ---------------------------------------------------------------
 * Rendering pipeline: fenced blocks first, then inline markdown.
 * All rendering goes through renderMd(). renderFinalResponse()
 * calls renderMd() then post-processes charts that need <canvas>.
 * --------------------------------------------------------------- */

function esc2(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* --- Block renderers --- */

function renderTableBlock(json) {
  try {
    const t = JSON.parse(json);
    const th = t.headers.map(h =>
      `<th class="text-left text-court-dim font-medium px-2 py-1.5 border-b border-navy-border bg-navy/50 text-[12px] whitespace-nowrap">${esc2(h)}</th>`
    ).join('');
    const rows = t.rows.map(r => '<tr>' + r.map(c =>
      `<td class="text-left text-court-text px-2 py-1 border-b border-navy-border/50 text-[12px]">${esc2(String(c))}</td>`
    ).join('') + '</tr>').join('');
    const title = t.title ? `<div class="text-white font-semibold text-[13px] mb-2">${esc2(t.title)}</div>` : '';
    return `<div class="my-3">${title}<div class="overflow-x-auto"><table class="w-full border-collapse"><thead><tr>${th}</tr></thead><tbody>${rows}</tbody></table></div></div>`;
  } catch(e) { return `<div class="text-red-400 text-[12px]">Table error: ${esc2(e.message)}</div>`; }
}

function renderMdTable(block) {
  const rows = block.trim().split('\n').filter(r => r.includes('|'));
  if (rows.length < 2) return block;
  const hasSep = /^\|?\s*[-:\s|]+$/.test(rows[1]);
  const dataRows = hasSep ? [rows[0], ...rows.slice(2)] : rows;
  const parse = r => { let s=r.trim(); if(s[0]==='|')s=s.slice(1); if(s.slice(-1)==='|')s=s.slice(0,-1); return s.split('|').map(c=>c.trim()); };
  let out = '<div class="overflow-x-auto my-3"><table class="w-full text-[12px] border-collapse">';
  dataRows.forEach((r,i) => {
    const cells = parse(r);
    const tag = (i===0 && hasSep) ? 'th' : 'td';
    const cls = tag==='th' ? 'text-left text-court-dim font-medium px-2 py-1.5 border-b border-navy-border bg-navy/50' : 'text-left text-court-text px-2 py-1 border-b border-navy-border/50';
    out += '<tr>' + cells.map(c=>`<${tag} class="${cls}">${c}</${tag}>`).join('') + '</tr>';
  });
  return out + '</table></div>';
}

/* --- Main render pipeline --- */

function renderMd(text) {
  // Step 1: Extract all fenced blocks (```type\n...\n```) into placeholders.
  // This protects them from inline markdown processing.
  const blocks = [];
  let html = text.replace(/```(\w+)\s*\n([\s\S]*?)```/g, function(_, type, content) {
    const idx = blocks.length;
    blocks.push({type, content: content.trim()});
    return `\u2603BLOCK${idx}\u2603`;
  });

  // Step 2: Inline markdown on the remaining text
  html = html.replace(/&/g, '&amp;');
  html = html.replace(/\n{3,}/g, '\n\n');
  html = html.replace(/^---$/gm, '<hr class="border-navy-border my-3">');

  // Markdown tables (pipe syntax) — before inline formatting
  html = html.replace(/((?:^\|.+$\n?){2,})/gm, m => renderMdTable(m));

  html = html.replace(/^### (.+)$/gm, '<h4 class="text-white font-semibold text-[14px] mt-4 mb-1">$1</h4>');
  html = html.replace(/^## (.+)$/gm, '<h3 class="text-white font-semibold text-[15px] mt-5 mb-1.5 pb-1 border-b border-navy-border">$1</h3>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Source lines in gold (handles *Source:*, **Source:**, Source:)
  html = html.replace(/\*{1,2}Source:\*{0,2}\s*(.+?)$/gm, '<div class="text-gold text-[12px] mt-2">Source: $1</div>');
  // News loading indicator with pulse animation
  html = html.replace(/\*Searching for news coverage\.\.\.\*/g,
    '<div class="text-court-dim text-[13px] mt-3 flex items-center gap-2 animate-pulse">' +
    '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>' +
    'Searching for news coverage...</div>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/^- (.+)$/gm, '<div class="pl-4 py-[1px] text-[14px] before:content-[\'·\'] before:text-gold before:mr-2">$1</div>');
  html = html.replace(/^\d+\. (.+)$/gm, '<div class="pl-4 py-[1px] text-[14px]">$1</div>');
  html = html.replace(/\n\n/g, '</p><p class="mt-2">');
  html = html.replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p class="mt-2"><\/p>/g, '');
  html = html.replace(/<p><\/p>/g, '');

  // Step 3: Replace placeholders with rendered blocks
  html = html.replace(/\u2603BLOCK(\d+)\u2603/g, function(_, idx) {
    const b = blocks[parseInt(idx)];
    if (b.type === 'table') return renderTableBlock(b.content);
    if (b.type === 'chart') return `<div data-chart='${esc2(b.content)}' class="my-3 py-2 text-[11px] text-court-dim">Loading chart...</div>`;
    // Unknown block type — render as code
    return `<pre class="bg-navy/50 rounded p-2 text-[12px] my-2 overflow-x-auto"><code>${esc2(b.content)}</code></pre>`;
  });

  return html;
}

function renderFinalResponse(contentEl, text, msgId) {
  contentEl.innerHTML = renderMd(text.trim());

  // Post-process: find chart placeholders and render with Chart.js
  contentEl.querySelectorAll('[data-chart]').forEach((el, i) => {
    try {
      const config = JSON.parse(el.dataset.chart);
      const cid = 'chart-' + msgId + '-' + i;
      el.className = 'max-w-2xl py-2';
      el.innerHTML = `<div class="bg-navy/50 border border-navy-border rounded-xl p-4"><canvas id="${cid}" style="width:100%;max-height:300px;"></canvas></div>`;
      el.removeAttribute('data-chart');
      setTimeout(() => renderChart(cid, config), 300);
    } catch(e) { el.textContent = 'Chart error: ' + e.message; }
  });
}

function localizeLabels(labels) {
  return labels.map(label => {
    const d = new Date(label);
    if (isNaN(d.getTime())) return label;
    // If it looks like an hourly timestamp, show short local time
    if (/^\d{4}-\d{2}-\d{2}[T ]\d{2}/.test(label))
      return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    // If just a date
    if (/^\d{4}-\d{2}-\d{2}$/.test(label))
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    return label;
  });
}

function renderChart(id, config) {
  const el = document.getElementById(id); if (!el) return;
  if (chartInstances[id]) chartInstances[id].destroy();
  if (config.labels) config.labels = localizeLabels(config.labels);
  const colors = ['#c8a03a','#3b82f6','#8b5cf6','#ec4899','#10b981','#06b6d4','#f43f5e','#84cc16'];
  if (config.datasets) config.datasets.forEach((ds, i) => {
    if (config.type === 'pie' || config.type === 'doughnut') {
      ds.backgroundColor = colors.slice(0, config.labels.length).map(c => c + 'cc');
      ds.borderColor = colors.slice(0, config.labels.length);
    } else { ds.backgroundColor = colors[i % colors.length] + '80'; ds.borderColor = colors[i % colors.length]; }
    ds.borderWidth = 1;
  });
  chartInstances[id] = new Chart(el, {
    type: config.type || 'bar',
    data: { labels: config.labels, datasets: config.datasets },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { title: { display: !!config.title, text: config.title, color: '#e8edf5', font: { size: 13 } }, legend: { labels: { color: '#8fa8c8', font: { size: 11 } } } },
      scales: config.type === 'pie' || config.type === 'doughnut' ? {} : {
        x: { ticks: { color: '#5a7aa0', font: { size: 10 } }, grid: { color: '#1e325408' } },
        y: { ticks: { color: '#5a7aa0', font: { size: 10 } }, grid: { color: '#1e325440' } }
      }
    }
  });
}
</script>
